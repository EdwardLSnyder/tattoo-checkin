<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copperhead Tattoo – Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #0a0a0a;
    --surface: #111111;
    --border:  #2a2a2a;
    --gold:    #c9a84c;
    --gold-dim:#7a6228;
    --text:    #e8e8e8;
    --muted:   #666;
    --radius:  6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 50%);
  }
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 22px 40px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--gold);
    line-height: 1;
  }
  .logo-text p {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  main {
    width: 100%;
    max-width: 580px;
    margin-top: 48px;
    padding: 0 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
  }
  .card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .card p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .field-group { margin-bottom: 16px; }
  .field-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  .field-group input {
    width: 100%;
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input:focus { border-color: var(--gold); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  #continueBtn {
    width: 100%;
    margin-top: 8px;
    background: var(--gold);
    color: var(--black);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #continueBtn:hover { opacity: 0.88; }
  .skip-wrap { text-align: center; margin-top: 16px; }
  .skip-wrap a {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
  }
  .skip-wrap a:hover { color: var(--text); }
</style>
</head>
<body>

<header>
  <div style="font-size:32px;line-height:1">🐍</div>
  <div class="logo-text">
    <h1>Copperhead Tattoo</h1>
    <p>7716 Main Street · Houma, LA 70360</p>
  </div>
</header>

<main>
  <div class="card">
    <h2>Client Check-In</h2>
    <p>Enter the client's information from their ID, then tap Continue to open the consent form with their details pre-filled.</p>

    <div class="field-group">
      <label>Full Name</label>
      <input type="text" id="fName" placeholder="First Last" autocomplete="off">
    </div>
    <div class="field-group">
      <label>Address</label>
      <input type="text" id="fAddress" placeholder="123 Main St" autocomplete="off">
    </div>
    <div class="field-group">
      <label>City, State and ZIP</label>
      <input type="text" id="fCityStateZip" placeholder="Houma, LA 70360" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>Phone</label>
        <input type="tel" id="fPhone" placeholder="(985) 000-0000" autocomplete="off">
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="fEmail" placeholder="you@email.com" autocomplete="off">
      </div>
    </div>

    <button id="continueBtn" onclick="openForm()">Continue to Consent Form →</button>
  </div>

  <div class="skip-wrap">
    <a href="#" onclick="skipToForm(); return false;">Skip — open blank consent form</a>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG — paste values from Apps Script logs here
// ══════════════════════════════════════════════════════
const FORM_BASE_URL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform";
const ENTRY = {
  name:         "entry.XXXXXXXXX",
  address:      "entry.XXXXXXXXX",
  cityStateZip: "entry.XXXXXXXXX",
  phone:        "entry.XXXXXXXXX",
  email:        "entry.XXXXXXXXX",
};
// ══════════════════════════════════════════════════════

function openForm() {
  var params = new URLSearchParams();
  function v(id) { return document.getElementById(id).value.trim(); }
  if (v('fName'))         params.set(ENTRY.name,         v('fName'));
  if (v('fAddress'))      params.set(ENTRY.address,      v('fAddress'));
  if (v('fCityStateZip')) params.set(ENTRY.cityStateZip, v('fCityStateZip'));
  if (v('fPhone'))        params.set(ENTRY.phone,        v('fPhone'));
  if (v('fEmail'))        params.set(ENTRY.email,        v('fEmail'));
  var qs = params.toString();
  window.open(FORM_BASE_URL + (qs ? '?' + qs : ''), '_blank');
}

function skipToForm() { window.open(FORM_BASE_URL, '_blank'); }
</script>

</body>
</html>
